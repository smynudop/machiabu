    <title>マチアブ</title>
    <style>

        :root{
            color-scheme: light dark;
        }

        *{
            box-sizing: border-box;
        }

        html{
            height: 100%;
            margin: 0;
        }

        body {
            background: light-dark(#dbdde0, rgb(40, 40, 44));
            color: light-dark(#222, rgb(205, 210, 218));
            font-family: sans-serif;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            height: 100%;
        }

        .wrapper {
            position:relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
            margin-top: 20px;
        }

        .orbit {
            position: absolute;
            inset: 0;
            animation: spin 6s linear infinite reverse;
        }

        .orbit img {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 50px;
            height: 50px;
            object-fit: cover;
            transform: translate(-50%, -50%) translateX(120px);

        }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.65);
            animation: pulse-brightness 2.4s ease-in-out infinite;
            pointer-events: none
        }

        @keyframes spin {
            from {
                transform: rotate(0deg)
            }

            to {
                transform: rotate(360deg)
            }
        }

        @keyframes pulse-brightness {
            0%,
            100% {
                opacity: 0.72;
                filter: brightness(0.95);
            }

            50% {
                opacity: 1;
                filter: brightness(1.18);
            }
        }

        footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .share-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 180px;
            padding: .5em;
            border-radius: 999px;
            background: #111827;
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            transition: opacity 0.2s ease;
            font-size: 90%;
        }

        .share-button:hover {
            opacity: 0.88;
        }
    </style>
</head>

<body>
    <h1>マチアブ</h1>
    <div class="wrapper">
        <div class="orbit">
            <img src="abu.png" alt="abu">
        </div>
        <div class="overlay">Waiting...</div>
    </div>
    <footer>
        <p style="text-align: center; margin: 0; color: #1d2a44;">
            <a href="https://x.com/udop" target="_blank" rel="noopener noreferrer">
                Created by @udop
            </a>

            X でシェア
        </a>
    </footer>
</body>
